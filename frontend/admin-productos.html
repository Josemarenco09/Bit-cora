<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="Tienda tecnologica virtual" content="Tienda" />
    <title>Admin</title>
    <link rel="stylesheet" href="css/estilos.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="agrupar">
    <!-- ENCABEZADO -->
    <header class="cabecera">
        <div class="container-fluid">
            <div class="row">
                <div class="col-6">
                    <h2></h2>
                </div>
            </div>
        </div>

        <div class="row align-items-center">
            <div class="col-6 rounded float-start" id="contender_welcome_image">
                <img id="imagen_logo" src="img/tecnohogar_logo.svg" alt="TecnoHogar">
            </div>
            <div class="col-6 text-end">
                <h1 id="nombre_tienda"> TecnoHogar </h1>
            </div>
        </div>
    </header>

    <!-- MENÚ DE NAVEGACIÓN -->
    <nav class="menu">
        <ul>
            <li><a href="index.html">Principal</a></li>
            <li><a href="ayuda.html">Ayuda</a></li>
            <li><a href="contacto.html">Contacto</a></li>
            <li><a href="admin-productos.html"> Admin </a></li>
            <li class="item-login"><a href="login.html"> Login </a></li>
        </ul>
    </nav>
    <main class="container py-5" id="adminProductos">
        <h1 class="text-center mb-4">Inventario de Productos</h1>

        <section class="card-custom mb-4">
            <h2 class="text-dark mb-3">Gestionar producto</h2>

            <form id="formProductoAdmin">
                <input type="hidden" id="id_producto">

                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="name_product">Nombre</label>
                        <input type="text" id="name_product" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label for="price_product">Precio</label>
                        <input type="number" id="price_product" class="form-control" min="0" required>
                    </div>

                    <div class="col-12">
                        <label for="description_product">Descripción</label>
                        <textarea id="description_product" class="form-control" rows="3" required></textarea>
                    </div>

                    <div class="col-12">
                        <label for="img">Ruta de imagen</label>
                        <input type="text" id="img" class="form-control" placeholder="img/televisor_smart.jpeg" required>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-primary" id="btnGuardarProducto">Guardar</button>
                    <button type="button" class="btn btn-secondary" id="btnCancelarProducto">Cancelar</button>
                </div>
            </form>

            <div id="respuestaProducto" class="mt-3"></div>
        </section>

        <section class="table-responsive">
            <table class="table table-striped table-bordered align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Precio</th>
                        <th>Imagen</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaProductosAdmin">
                </tbody>
            </table>
        </section>
    </main>
        <footer class="pie">
            Derechos reservados 2026
        </footer>
    </div>

    <script src="js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
