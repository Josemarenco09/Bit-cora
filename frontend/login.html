<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="Tienda tecnologica virtual" content="Tienda" />
    <title>Login</title>
    <link rel="stylesheet" href="css/estilos.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="agrupar">
    <!-- ENCABEZADO -->
    <header class="cabecera">
        <div class="container-fluid">
            <div class="row">
                <div class="col-6">
                    <h2></h2>
                </div>
            </div>
        </div>
        <div class="row align-items-center">
            <div class="col-6 rounded float-start" id="contender_welcome_image">
                <img id="imagen_logo" src="img/tecnohogar_logo.svg" alt="TecnoHogar">
            </div>
            <div class="col-6 text-end">
                <h1 id="nombre_tienda"> TecnoHogar </h1>
            </div>
        </div>
    </header>
    <!-- MENÚ DE NAVEGACIÓN -->
    <nav class="menu">
        <ul>
            <li><a href="index.html">Principal</a></li>
            <li><a href="ayuda.html">Ayuda</a></li>
            <li><a href="contacto.html">Contacto</a></li>
            <li><a href="admin-productos.html"> Admin </a></li>
            <li class="item-login"><a href="login.html"> Login </a></li>
        </ul>
    </nav>
    <main>
        <div class="container-fluid">
            <div class="row>">
                <div class="col-12 text-center">
                    <h1> Login </h1>
                </div>
            </div>
        </div>
        <section class="container mt-5 mb-5">
                <div class="row justify-content-center">
                    <div class="col-md-5">
                        <div class="card-custom">
                            <h2 class="text-center mb-4 text-dark">
                                Iniciar Sesión
                            </h2>
                            <form id="loginForm">
                                <div class="mb-3">
                                    <label for="email_user">Correo</label>
                                    <input
                                        type="email"
                                        id="email_user"
                                        class="form-control"
                                        required
                                    >
                                </div>
                                <div class="mb-3">
                                    <label for="password_user">Contraseña</label>
                                    <input
                                        type="password"
                                        id="password_user"
                                        class="form-control"
                                        required
                                    >
                                </div>
                                <button
                                    type="submit"
                                    class="btn btn-primary w-100">
                                    Ingresar
                                </button>
                            </form>
                            <div id="mensajeLogin" class="mt-3"></div>
                        </div>
                    </div>
                </div>
            </section>
    </main>
        <footer class="pie">
            Derechos reservados 2026
        </footer>
    </div>

    <script src="js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
