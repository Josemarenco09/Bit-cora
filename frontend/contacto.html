<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> 
</head>

<body>

<div class="agrupar">

    <!-- ENCABEZADO -->
      <header class="cabecera">
        <div class="container-fluid">
          <div class="row">
            <div class="col-6">
              <h2> Contactanos </h2>
            </div>
          </div>
        </div>

        <div class="row align-items-center">
          <div class="col-6 rounded float-start" id="contender_welcome_image">
            <img id="imagen_logo" src="img/tecnohogar_logo.svg" alt="TecnoHogar">
          </div>
          <div class="col-6 text-end">
            <h1 id="nombre_tienda"> TecnoHogar </h1>
          </div>
        </div>
      
      </header>

      <!-- MENÚ DE NAVEGACIÓN -->
      <nav class="menu">
        <ul>
          <li><a href="index.html">Principal</a></li>
          <li><a href="ayuda.html">Ayuda</a></li>
          <li><a href="contacto.html">Contacto</a></li>
          <li><a href="admin-productos.html"> Admin </a></li>
          <li class="item-login"><a href="login.html"> Login </a></li>
        </ul>
      </nav>
    <main class="container py-5">
        <div class="row justify-content-center g-4">
            <div class="col-lg-7">
                <section class="card-custom">
                    <h1 class="titulo-principal text-center mb-4">Contacto</h1>

                    <form id="formulario">
                        <div class="mb-3">
                            <label for="nombre">Nombre</label>
                            <input type="text" id="nombre" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label for="correo">Correo</label>
                            <input type="email" id="correo" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label for="telefono">Teléfono</label>
                            <input type="tel" id="telefono" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label for="mensaje">Mensaje</label>
                            <textarea id="mensaje" class="form-control" rows="4"></textarea>
                        </div>

                        <button class="btn btn-primary w-100" type="submit">Enviar</button>
                    </form>

                    <!-- Mensaje dinámico -->
                    <p id="respuesta" class="mt-3 text-center"></p>
                </section>
            </div>

            <div class="col-lg-4">
                <aside class="card-custom h-100">
                    <h2 class="titulo-card">Información</h2>
                    <p><strong>Teléfono:</strong> 123456789</p>
                    <p><strong>Email:</strong> contacto@misitio.com</p>
                    <p>Escríbenos y responderemos tu solicitud lo más pronto posible.</p>
                </aside>
            </div>
        </div>
    </main>

    <footer class="pie">
        Página de contacto
    </footer>

</div>

<!-- Conexión con JavaScript -->
<script src="js/script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"> </script> 

</body>
</html>
